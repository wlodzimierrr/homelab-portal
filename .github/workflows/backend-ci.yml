name: backend-ci

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: homelab
          POSTGRES_USER: homelab
          POSTGRES_PASSWORD: homelab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homelab -d homelab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      POSTGRES_DB: homelab
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab
      DATABASE_URL: postgresql+psycopg://homelab:homelab@127.0.0.1:5432/homelab

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5432
          for attempt in range(1, 61):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print(f"Postgres reachable on attempt {attempt}")
                      raise SystemExit(0)
              except OSError:
                  time.sleep(2)
          raise SystemExit("Postgres did not become reachable in time")
          PY

      - name: Run migrations twice (idempotency)
        run: |
          alembic upgrade head
          alembic upgrade head

      - name: Run tests
        run: pytest
