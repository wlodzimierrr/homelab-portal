name: Portal CI Images

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/portal-images.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/portal-images.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend lint deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Lint backend
        working-directory: backend
        run: ruff check app tests scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: homelab
          POSTGRES_USER: homelab
          POSTGRES_PASSWORD: homelab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homelab -d homelab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://homelab:homelab@127.0.0.1:5432/homelab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Wait for PostgreSQL
        working-directory: backend
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5432
          for attempt in range(1, 61):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print(f"Postgres reachable on attempt {attempt}")
                      raise SystemExit(0)
              except OSError:
                  time.sleep(2)
          raise SystemExit("Postgres did not become reachable in time")
          PY

      - name: Run backend migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck/build validation
        working-directory: frontend
        run: npm run build

  build-images:
    name: Build Image (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    strategy:
      matrix:
        service:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: local/${{ matrix.service.name }}:ci-${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: local/${{ matrix.service.name }}:ci-${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service.name }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}-${{ github.sha }}
          path: sbom-${{ matrix.service.name }}.spdx.json
          if-no-files-found: error

  publish-images:
    name: Publish Image (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: homelab-api
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: homelab-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}
          tags: |
            type=sha,format=long,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  promote-dev-gitops:
    name: Promote Dev GitOps Image Tags
    runs-on: ubuntu-latest
    needs:
      - publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      GITOPS_REPO: wlodzimierrr/homelab-workloads
      DEV_IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.HOMELAB_WORKLOADS_REPO_TOKEN }}
          path: homelab-workloads

      - name: Update dev image tags
        id: update_tags
        run: |
          set -euo pipefail

          api_patch="homelab-workloads/apps/homelab-api/envs/dev/patch-deployment.yaml"
          api_migration_patch="homelab-workloads/apps/homelab-api/envs/dev/patch-migration-job.yaml"
          web_patch="homelab-workloads/apps/homelab-web/envs/dev/patch-deployment.yaml"

          sed -E -i "s#(image:[[:space:]]*ghcr\\.io/[^/]+/homelab-api:).*#\\1${DEV_IMAGE_TAG}#" "$api_patch"
          sed -E -i "s#(image:[[:space:]]*ghcr\\.io/[^/]+/homelab-api:).*#\\1${DEV_IMAGE_TAG}#" "$api_migration_patch"
          sed -E -i "s#(image:[[:space:]]*ghcr\\.io/[^/]+/homelab-web:).*#\\1${DEV_IMAGE_TAG}#" "$web_patch"

          if git -C homelab-workloads diff --quiet; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "updated=true" >> "$GITHUB_OUTPUT"
          git -C homelab-workloads diff -- \
            apps/homelab-api/envs/dev/patch-deployment.yaml \
            apps/homelab-api/envs/dev/patch-migration-job.yaml \
            apps/homelab-web/envs/dev/patch-deployment.yaml

      - name: Create PR in GitOps repo
        if: steps.update_tags.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMELAB_WORKLOADS_REPO_TOKEN }}
          path: homelab-workloads
          branch: automation/dev-image-bump-${{ github.sha }}
          delete-branch: true
          title: "chore(dev): bump portal images to ${{ env.DEV_IMAGE_TAG }}"
          commit-message: "chore(dev): bump homelab portal images to ${{ env.DEV_IMAGE_TAG }}"
          body: |
            Automated update from `apps/portal` image pipeline.

            - backend -> `ghcr.io/${{ github.repository_owner }}/homelab-api:${{ env.DEV_IMAGE_TAG }}`
            - backend migration job -> `ghcr.io/${{ github.repository_owner }}/homelab-api:${{ env.DEV_IMAGE_TAG }}`
            - frontend -> `ghcr.io/${{ github.repository_owner }}/homelab-web:${{ env.DEV_IMAGE_TAG }}`

            Trigger commit: `${{ github.sha }}`
